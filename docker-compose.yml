services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medscribe
      POSTGRES_PASSWORD: medscribe_dev
      POSTGRES_DB: medscribe
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
